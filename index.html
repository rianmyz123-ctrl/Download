<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #hasil {
            margin-top: 20px;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Downloader</h2>

    <input type="text" id="link" placeholder="Masukkan URL video">

    <button onclick="proses()">Proses</button>

    <p id="hasil"></p>
</div>

<script>
function proses() {
    let link = document.getElementById("link").value;

    if(link === ""){
        alert("Masukkan URL terlebih dahulu!");
        return;
    }

    document.getElementById("hasil").innerHTML =
    "URL diterima: <br><b>" + link + "</b><br><br>Silakan hubungkan ke API milik Anda.";
}
</script>

</body>
</html>
